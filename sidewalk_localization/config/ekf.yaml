ekf_local_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # IMU only — wheel/odom excluded because /wheel/odom only publishes
    # when RPMs change, leaving the EKF stuck at startup with a stationary robot.
    # The EKF will start publishing odom→base_link immediately after the first
    # IMU message, giving the costmap the TF it needs to activate.
    imu0: /earth_rover/imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: true
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: true

    odom0: /wheel/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_queue_size: 20

navsat_transform_node:
  ros__parameters:
    frequency: 10.0
    delay: 1.0
    transform_timeout: 2.0

    base_link_frame: base_link
    gps_frame: gps_link

    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_cartesian_transform: false
    publish_filtered_gps: true
    use_odometry_yaw: false

ekf_global_node:
  ros__parameters:
    frequency: 10.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: /odometry/local
    odom0_config: [false, false, false,
                   false, false, true,    # Yaw
                   true,  false, false,   # vx
                   false, false, true,    # vyaw
                   false, false, false]
    odom0_differential: false
    odom0_queue_size: 20

    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_queue_size: 20